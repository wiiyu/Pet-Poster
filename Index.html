<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- 强制锁定亮色模式 -->
    <meta name="color-scheme" content="light">
    <meta name="supported-color-schemes" content="light">
    <title>宠物领养海报生成器</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    
    <!-- Yozai 字体调用 -->
    <link href="https://cdn.jsdelivr.net/npm/@chinese-fonts/yozai@3.0.0/dist/Yozai-Regular/result.min.css" rel="stylesheet">
    <!-- 站酷快乐体 调用 -->
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    
    <style>
        :root {
            color-scheme: light;
            --primary-color: #2c3e50;
            --bg-color: #f5f6fa;
            --border-color: #dcdde1;
            --gender-bg: #D3DCE0;
            --dot-bg: #6B8798;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            /* 全局应用站酷快乐体 */
            font-family: 'ZCOOL KuaiLe', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            background-image: linear-gradient(var(--bg-color), var(--bg-color));
            color: var(--primary-color);
            display: flex;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .container {
            display: flex;
            gap: 2rem;
            max-width: 1200px;
            width: 100%;
        }

        .form-section {
            flex: 1;
            background: #fff;
            background-image: linear-gradient(#fff, #fff);
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            min-width: 320px;
            color: #2c3e50;
        }

        .form-group { margin-bottom: 1.5rem; }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        input[type="text"], select, textarea, button {
            font-family: inherit;
        }

        input[type="text"], select, textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 1rem;
            background-color: #fff;
            color: #2c3e50;
        }

        textarea { resize: vertical; height: 100px; }

        .preview-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 1rem;
            width: 100%;
            overflow: visible; 
        }

        .zoom-control-panel {
            width: 100%;
            max-width: 450px;
            background: #ffffff;
            background-image: linear-gradient(#ffffff, #ffffff);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .zoom-control-panel label {
            margin-bottom: 0;
            white-space: nowrap;
            font-size: 0.95rem;
            color: #4A4A4A;
        }

        input[type="range"] {
            flex: 1;
            margin: 0;
            accent-color: var(--dot-bg);
        }

        .poster-wrapper {
            width: 450px;
            height: 600px;
            transform-origin: top center;
            transition: transform 0.2s ease;
        }

        .poster {
            width: 450px;
            height: 600px;
            flex-shrink: 0;
            background-color: var(--gender-bg);
            background-image: linear-gradient(var(--gender-bg), var(--gender-bg));
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .poster-image-container {
            height: 415px; 
            width: 100%;
            background-color: #e8e8e8;
            position: relative;
            overflow: hidden; 
        }

        .poster-image-container::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 130px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.35) 0%, rgba(0, 0, 0, 0) 100%);
            pointer-events: none;
            z-index: 1;
        }

        .wave-overlay {
            position: absolute;
            bottom: -3px; 
            left: 0;
            width: 100%;
            height: 24px; 
            z-index: 2;
        }

        .main-photo {
            position: absolute;
            cursor: grab;
            touch-action: none; 
            max-width: none;
            max-height: none;
            -webkit-user-drag: none;
            user-select: none;
            -moz-user-select: none;
            -webkit-user-select: none;
            -ms-user-select: none;
        }
        
        .main-photo:active { cursor: grabbing; }

        /* 名字使用 Yozai 字体 */
        .info-name-tag {
            font-family: 'Yozai', cursive;
            position: absolute;
            left: 24px;
            bottom: 9.5px; 
            color: #ffffff;
            font-size: 2.6rem;
            font-weight: 700;
            z-index: 3;
            line-height: 1;
            letter-spacing: 2px;
        }

        .frame-logo {
            position: absolute;
            right: 24px;
            bottom: 2.3px; 
            transform: none; 
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 50%;
            object-fit: cover;
            background-color: #fff;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
            z-index: 10;
        }

        .poster-info-container {
            height: 185px; 
            padding: 8px 24px 12px 24px;
            display: flex;
            flex-direction: column;
            color: #4A4A4A;
            background-color: var(--gender-bg);
            background-image: linear-gradient(var(--gender-bg), var(--gender-bg));
            position: relative;
            z-index: 1;
        }

        .poster-info-container > div { position: relative; z-index: 1; }

        .paw-print {
            position: absolute;
            right: 12px;
            bottom: 12px;
            transform: rotate(-20deg);
            width: 7rem;
            height: 7rem;
            opacity: 0.6;
            z-index: 0; 
            pointer-events: none;
        }

        .info-breed { font-size: 1.05rem; font-weight: 700; border-bottom: 1px solid rgba(74, 74, 74, 0.15); padding-bottom: 4px; margin-bottom: 6px; letter-spacing: 1px; line-height: 1.2; color: #4A4A4A; }
        .info-grid { display: flex; justify-content: space-between; align-items: center; width: 100%; border-bottom: 1px solid rgba(74, 74, 74, 0.15); padding-bottom: 4px; margin-bottom: 6px; color: #4A4A4A; }
        .attr-item { display: flex; align-items: center; font-size: 0.95rem; font-weight: 700; line-height: 1.2; white-space: nowrap; }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; display: inline-block; flex-shrink: 0; background-color: var(--dot-bg); }
        .info-story-label { font-size: 0.8rem; font-weight: 700; opacity: 0.9; margin-top: 0; margin-bottom: 2px; letter-spacing: 1px; line-height: 1; color: #4A4A4A; }
        
        .info-story {
            font-size: 0.85rem; font-weight: 400; line-height: 1.4; color: #4A4A4A;
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; text-align: justify;
        }

        .bottom-bar { margin-top: auto; display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .qr-code { width: 2.6rem; height: 2.6rem; object-fit: cover; background-color: #fff; border-radius: 4px; }
        .stamp-container { width: 7.6rem; display: flex; flex-direction: column; justify-content: center; color: #4A4A4A; }
        
        /* 标题使用 Yozai 字体 */
        .stamp-zh { font-family: 'Yozai', cursive; display: flex; justify-content: space-between; font-size: 1.8rem; font-weight: 700; line-height: 1; letter-spacing: 2px; margin-right: -2px; }
        .stamp-en { font-family: 'Yozai', cursive; display: flex; justify-content: space-between; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; margin-top: 0.38rem; opacity: 0.8; letter-spacing: 1px; }

        .export-btn {
            margin-top: 2rem;
            padding: 1rem 2rem;
            background-color: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .export-btn:hover { background-color: #1a252f; }

        .random-btn {
            background-color: var(--dot-bg);
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 0.2rem 0.6rem;
            font-size: 0.8rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .random-btn:hover { opacity: 0.8; }

        @media (max-width: 900px) {
            .container { flex-direction: column; }
            body { padding: 1rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="form-section">
        <h2 style="margin-bottom: 1.5rem;">输入宠物资料</h2>
        <div class="form-group">
            <label>上传照片</label>
            <input type="file" id="inputPhoto" accept="image/png, image/jpeg, image/webp">
        </div>
        <div class="form-group">
            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 0.5rem;">
                <label style="margin-bottom: 0;">名字</label>
                <button id="btnRandomName" type="button" class="random-btn">🎲 随机生成</button>
            </div>
            <input type="text" id="inputName" value="输入名字">
        </div>
        <div class="form-group">
            <label>品种和性格</label>
            <input type="text" id="inputBreed" value="中华田园犬，亲人">
        </div>
        <div class="form-group">
            <label>性别</label>
            <select id="inputGender">
                <option value="弟弟">弟弟</option>
                <option value="妹妹">妹妹</option>
            </select>
        </div>
        <div class="form-group">
            <label>年龄</label>
            <input type="text" id="inputAge" value="3个月">
        </div>
        <div class="form-group">
            <label>体重</label>
            <input type="text" id="inputWeight" value="3kg">
        </div>
        <div class="form-group">
            <label>疫苗情况</label>
            <select id="inputVaccine">
                <option value="已疫苗">已疫苗</option>
                <option value="未疫苗">未疫苗</option>
            </select>
        </div>
        <div class="form-group">
            <label>绝育情况</label>
            <select id="inputSpay">
                <option value="已绝育">已绝育</option>
                <option value="未绝育">未绝育</option>
            </select>
        </div>
        <div class="form-group">
            <label>Ta的故事</label>
            <textarea id="inputStory" placeholder="简述宠物的性格和救助经历..."></textarea>
        </div>
    </div>

            <input type="range" id="zoomSlider" min="1" max="3" step="0.01" value="1">
        </div>

        <div class="poster-wrapper" id="posterWrapper">
            <div class="poster" id="posterElement">
                <div class="poster-image-container" id="photoContainer">

<script>
    let posterViewScale = 1;
    function resizePoster() {
        const wrap = document.getElementById('previewSection');
        const posterWrap = document.getElementById('posterWrapper');
        const scale = Math.min(1, wrap.clientWidth / 482); 
        posterViewScale = scale;
        posterWrap.style.transform = `scale(${scale})`;
        posterWrap.style.height = `${600 * scale}px`; 
    }
    window.addEventListener('resize', resizePoster);
    resizePoster(); 

    const bindings = [
        { input: 'inputName', render: 'renderName' },
        { input: 'inputGender', render: 'renderGender' },
        { input: 'inputBreed', render: 'renderBreed' },
        { input: 'inputAge', render: 'renderAge' },
        { input: 'inputWeight', render: 'renderWeight' },
        { input: 'inputVaccine', render: 'renderVaccine' },
        { input: 'inputSpay', render: 'renderSpay' },
        { input: 'inputStory', render: 'renderStory' }
    ];

    const updateTheme = () => {
        const gender = document.getElementById('inputGender').value;
        const posterNode = document.getElementById('posterElement');
        const themeColors = {
            '弟弟': { bg: '#D3DCE0', dot: '#6B8798' }, 
            '妹妹': { bg: '#F2E6E6', dot: '#C08D8D' }, 
            '未知': { bg: '#E0E5E8', dot: '#747D82' }
        };
        const target = themeColors[gender] || themeColors['未知'];
        posterNode.style.setProperty('--gender-bg', target.bg);
        posterNode.style.setProperty('--dot-bg', target.dot);

        const svgStr = `<svg width="1440" height="320" viewBox="0 0 1440 320" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg"><path fill="${target.bg}" fill-opacity="1" d="M0,64L48,80C96,96,192,128,288,117.3C384,107,480,53,576,42.7C672,32,768,64,864,85.3C960,107,1056,117,1152,101.3C1248,85,1344,43,1392,21.3L1440,0L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>`;
        const base64Svg = window.btoa(unescape(encodeURIComponent(svgStr)));
        document.getElementById('waveImage').src = `data:image/svg+xml;base64,${base64Svg}`;
    };

    bindings.forEach(binding => {
        const inputEl = document.getElementById(binding.input);
        const renderEl = document.getElementById(binding.render);
        inputEl.addEventListener('input', () => renderEl.textContent = inputEl.value);
        inputEl.addEventListener('change', () => {
            renderEl.textContent = inputEl.value;
            if (binding.input === 'inputGender') updateTheme();
        });
    });
    updateTheme();

    const renderPhoto = document.getElementById('renderPhoto');
    const zoomSlider = document.getElementById('zoomSlider');
    const zoomControlGroup = document.getElementById('zoomControlGroup');
    
    let imgNativeWidth = 450, imgNativeHeight = 415; 
    let currentScale = 1, minScale = 1;
    let offsetX = 0, offsetY = 0; 
    const containerW = 450, containerH = 415;

    function applyImageTransform() {
        if (!imgNativeWidth) return;
        const renderW = imgNativeWidth * currentScale;
        const renderH = imgNativeHeight * currentScale;

        const maxX = Math.max(0, (renderW - containerW) / 2);
        const maxY = Math.max(0, (renderH - containerH) / 2);

        offsetX = Math.max(-maxX, Math.min(maxX, offsetX));
        offsetY = Math.max(-maxY, Math.min(maxY, offsetY));

        const left = (containerW - renderW) / 2 + offsetX;
        const top = (containerH - renderH) / 2 + offsetY;

        renderPhoto.style.width = renderW + 'px';
        renderPhoto.style.height = renderH + 'px';
        renderPhoto.style.left = left + 'px';
        renderPhoto.style.top = top + 'px';
        
        zoomSlider.value = currentScale;
    }

    document.getElementById('inputPhoto').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    imgNativeWidth = img.width;
                    imgNativeHeight = img.height;
                    
                    minScale = Math.max(containerW / imgNativeWidth, containerH / imgNativeHeight);
                    currentScale = minScale; 
                    offsetX = 0; offsetY = 0; 
                    
                    zoomSlider.min = minScale;
                    zoomSlider.max = minScale * 3; 
                    zoomSlider.step = (minScale * 3 - minScale) / 100;
                    zoomControlGroup.style.display = 'flex'; 

                    renderPhoto.src = event.target.result;
                    applyImageTransform();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }
    });

    zoomSlider.addEventListener('input', (e) => {
        currentScale = parseFloat(e.target.value);
        applyImageTransform();
    });

    renderPhoto.addEventListener('wheel', (e) => {
        e.preventDefault();
        const zoomStep = minScale * 0.1;
        if (e.deltaY < 0) {
            currentScale = Math.min(zoomSlider.max, currentScale + zoomStep);
        } else {
            currentScale = Math.max(minScale, currentScale - zoomStep);
        }
        applyImageTransform();
    });

    let isDragging = false;
    let startX, startY, initialOffsetX, initialOffsetY;

    const startDrag = (e) => {
        isDragging = true;
        renderPhoto.style.cursor = 'grabbing';
        
        if (e.type.includes('mouse')) {
            e.preventDefault();
        }
        
        startX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
        startY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
        initialOffsetX = offsetX;
        initialOffsetY = offsetY;
    };

    const onDrag = (e) => {
        if (!isDragging) return;
        e.preventDefault(); 
        const currentX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
        const currentY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
        
        const deltaX = (currentX - startX) / posterViewScale;
        const deltaY = (currentY - startY) / posterViewScale;
        
        offsetX = initialOffsetX + deltaX;
        offsetY = initialOffsetY + deltaY;
        
        applyImageTransform(); 
    };

    const endDrag = () => {
        isDragging = false;
        renderPhoto.style.cursor = 'grab';
    };

    renderPhoto.addEventListener('mousedown', startDrag);
    renderPhoto.addEventListener('touchstart', startDrag, { passive: false });
    window.addEventListener('mousemove', onDrag, { passive: false });
    window.addEventListener('touchmove', onDrag, { passive: false });
    window.addEventListener('mouseup', endDrag);
    window.addEventListener('touchend', endDrag);

    const singleChars = ["糯", "甜", "酥", "软", "脆", "蜜", "奶", "糖", "冰", "焦", "香", "豆", "麦", "果", "米"];
    const doubleChars = ["麻薯", "汤圆", "布丁", "蛋挞", "饼干", "馒头", "芝麻", "奶酪", "泡芙", "锅贴", "吐司", "薯条", "饭团", "蛋卷", "烧麦"];

    function generateRandomName() {
        const singleIndex = Math.floor(Math.random() * singleChars.length);
        const doubleIndex = Math.floor(Math.random() * doubleChars.length);
        const nameInput = document.getElementById('inputName');
        nameInput.value = singleChars[singleIndex] + doubleChars[doubleIndex];
        nameInput.dispatchEvent(new Event('input'));
    }
    document.getElementById('btnRandomName').addEventListener('click', generateRandomName);
    generateRandomName(); 

    async function exportPoster() {
        const posterWrap = document.getElementById('posterWrapper');
        const posterNode = document.getElementById('posterElement');
        const petName = document.getElementById('inputName').value || '宠物';
        
        const originalTransform = posterWrap.style.transform;
        posterWrap.style.transform = 'none'; 
        
        await new Promise(resolve => setTimeout(resolve, 50)); 

        html2canvas(posterNode, { 
            scale: 2, 
            useCORS: true,
            width: 450,
            height: 600
        }).then(canvas => {
            posterWrap.style.transform = originalTransform; 
            const link = document.createElement('a');
            link.download = `领养海报_${petName}.jpg`;
            link.href = canvas.toDataURL("image/jpeg", 0.9);
            link.click();
        });
    }
</script>

</body>
</html>
