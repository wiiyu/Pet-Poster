<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- 强制锁定亮色模式设置，添加针对部分内核的防暗黑标签 -->
    <meta name="color-scheme" content="light">
    <meta name="supported-color-schemes" content="light">
    <meta name="nightmode" content="disable">
    <meta name="force-dark-mode" content="false">
    <title>宠物领养海报生成器 v1.2.0</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    
    <!-- Yozai 字体调用 -->
    <link href="https://cdn.jsdelivr.net/npm/@chinese-fonts/yozai@3.0.0/dist/Yozai-Regular/result.min.css" rel="stylesheet">
    <!-- 站酷快乐体 调用 -->
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    
    <style>
        :root {
            color-scheme: light;
            --primary-color: #2c3e50;
            --bg-color: #f5f6fa;
            --border-color: #dcdde1;
            --gender-bg: #D3DCE0;
            --dot-bg: #6B8798;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            /* 全局应用站酷快乐体 */
            font-family: 'ZCOOL KuaiLe', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            background-image: linear-gradient(var(--bg-color), var(--bg-color));
            color: var(--primary-color);
            display: flex;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .container {
            display: flex;
            gap: 2rem;
            max-width: 1200px;
            width: 100%;
        }

        .form-section {
            flex: 1;
            background-color: #fff !important;
            background-image: url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9IiNmZmYiLz48L3N2Zz4=") !important;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            min-width: 320px;
            color: #2c3e50;
        }

        .form-group { margin-bottom: 1.5rem; }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        input[type="text"], select, textarea, button {
            font-family: inherit;
        }

        input[type="text"], select, textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 1rem;
            background-color: #fff !important;
            color: #2c3e50 !important;
            -webkit-text-fill-color: #2c3e50 !important;
        }

        textarea { resize: vertical; height: 100px; }

        .preview-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 1rem;
            width: 100%;
            overflow: visible; 
        }

        .zoom-control-panel {
            width: 100%;
            max-width: 450px;
            background-color: #ffffff !important;
            background-image: url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9IiNmZmYiLz48L3N2Zz4=") !important;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .zoom-control-panel label {
            margin-bottom: 0;
            white-space: nowrap;
            font-size: 0.95rem;
            color: #4A4A4A !important;
            -webkit-text-fill-color: #4A4A4A !important;
        }

        input[type="range"] {
            flex: 1;
            margin: 0;
            accent-color: var(--dot-bg);
        }

        .poster-wrapper {
            width: 450px;
            height: 600px;
            transform-origin: top center;
            transition: transform 0.2s ease;
        }

        .poster {
            width: 450px;
            height: 600px;
            flex-shrink: 0;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .poster-image-container {
            height: 415px; 
            width: 100%;
            background: repeating-linear-gradient(
                45deg,
                #f5f5f5,
                #f5f5f5 20px,
                #e8e8e8 20px,
                #e8e8e8 40px
            );
            position: relative;
            border: none;
            outline: none;
            /* Push down into info section so no seam gap is exposed */
            margin-bottom: -18px;
            z-index: auto;
        }

        /* 新增：专属的照片裁剪隔离层，将照片严格切断，防止其延伸到海报最底部 */
        .photo-crop-layer {
            position: absolute;
            top: -1px;
            left: -1px;
            width: calc(100% + 2px);
            height: calc(100% + 2px);
            overflow: hidden;
            z-index: 0;
        }

        .gradient-mask {
            position: absolute;
            left: -2px;
            width: calc(100% + 4px);
            top: 0;
            bottom: -20px; 
            pointer-events: none;
            z-index: 1;
            /* 經過抗誤差優化的 CSS 漸層：拉伸至頂部並調整 stop，消除 html2canvas 導出時邊緣產生的 1px 细线 */
            background: linear-gradient(to top, rgba(42, 27, 18, 0.6) 0%, rgba(42, 27, 18, 0) 35%, rgba(42, 27, 18, 0) 100%);
        }

        .wave-overlay {
            position: absolute;
            bottom: 0px; 
            left: 0;
            width: 100%;
            height: 34px; /* tall enough to overlap the seam into info section */
            z-index: 2;
            overflow: hidden;
        }

        .wave-overlay svg {
            position: absolute;
            left: 0;
            top: 0;
            width: 200%;
            height: 100%;
        }

        .wave-overlay .wave-main-svg {
            z-index: 2;
            top: 2px;
            animation: waveMoveLeft 10s linear infinite;
        }

        .wave-overlay .wave-back-svg {
            z-index: 1;
            top: -5.5px; /* Offset upwards */
            height: 41px; /* taller to match new container height + offset */
            animation: waveMoveRight 7s linear infinite;
        }

        @keyframes waveMoveLeft {
            0% {
                left: 0%;
            }
            100% {
                left: -100%;
            }
        }

        @keyframes waveMoveRight {
            0% {
                left: -100%;
            }
            100% {
                left: 0%;
            }
        }

        .main-photo {
            position: absolute;
            cursor: grab;
            touch-action: none; 
            max-width: none;
            max-height: none;
            -webkit-user-drag: none;
            user-select: none;
            -moz-user-select: none;
            -webkit-user-select: none;
            -ms-user-select: none;
        }
        
        .main-photo:active { cursor: grabbing; }

        .info-name-tag {
            font-family: 'Yozai', cursive;
            position: absolute;
            left: 24px;
            bottom: 24px; 
            color: #ffffff !important;
            -webkit-text-fill-color: #ffffff !important;
            font-size: 2.6rem;
            font-weight: 700;
            z-index: 4;
            line-height: 1;
            letter-spacing: 2px;
        }

        .frame-logo {
            position: absolute;
            right: 24px;
            bottom: -1.7px; 
            width: 4rem; 
            height: 4rem; 
            border-radius: 50%;
            object-fit: contain; 
            padding: 0.28rem; 
            background-color: #fff;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
            z-index: 10;
            animation: floatingBottle 4s ease-in-out infinite;
            transform-origin: bottom center;
        }

        @keyframes floatingBottle {
            0% { transform: translateY(0) rotate(-6deg); }
            50% { transform: translateY(-10px) rotate(6deg); }
            100% { transform: translateY(0) rotate(-6deg); }
        }

        .poster-info-container {
            height: 185px; 
            flex-grow: 1;
            padding: 26px 24px 10px 24px; /* top padding absorbs the overlap */
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 3;
            color: #4A4A4A !important;
            -webkit-text-fill-color: #4A4A4A !important;
        }

        .poster-info-container > div { position: relative; z-index: 1; }

        .info-breed { 
            font-size: 1.05rem; font-weight: 700; 
            padding-bottom: 6px; 
            margin-bottom: 6px; 
            letter-spacing: 1px; line-height: 1.1; 
            color: #4A4A4A !important; -webkit-text-fill-color: #4A4A4A !important;
            border-bottom: 1px solid rgba(74, 74, 74, 0.15);
        }
        
        .info-grid { 
            display: flex; justify-content: space-between; align-items: center; width: 100%; 
            padding-bottom: 6px; 
            margin-bottom: 6px; 
            color: #4A4A4A !important; -webkit-text-fill-color: #4A4A4A !important;
            border-bottom: 1px solid rgba(74, 74, 74, 0.15);
        }

        .attr-item { 
            display: flex; 
            align-items: center;
            font-size: 0.95rem; font-weight: 400; white-space: nowrap; 
            color: #4A4A4A !important; -webkit-text-fill-color: #4A4A4A !important; 
        }
        .dot { 
            width: 6px; height: 6px; margin-right: 5px; 
            flex-shrink: 0;
            position: relative;
            top: -1px; 
            background-color: transparent !important; 
            background-size: cover;
            background-position: center;
        }
        .attr-text {
            display: block;
            line-height: 1.1; 
        }
        
        .info-story-label { font-size: 0.8rem; font-weight: 700; opacity: 0.9; margin-top: 0; margin-bottom: 2px; letter-spacing: 1px; line-height: 1; color: #4A4A4A !important; -webkit-text-fill-color: #4A4A4A !important; }
        
        .info-story {
            font-size: 0.85rem; font-weight: 300; opacity: 0.85; line-height: 1.2; color: #4A4A4A !important; -webkit-text-fill-color: #4A4A4A !important;
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; text-align: justify;
        }

        .bottom-bar { margin-top: auto; display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .qr-code { width: 3rem; height: 3rem; object-fit: cover; background-color: transparent; border-radius: 4px; }
        .stamp-container { width: 8.5rem; display: flex; flex-direction: column; justify-content: center; color: #4A4A4A !important; -webkit-text-fill-color: #4A4A4A !important; }
        
        .stamp-zh { font-family: 'Yozai', cursive; display: flex; justify-content: space-between; font-size: 2rem; font-weight: 700; line-height: 1; letter-spacing: 2px; margin-right: -2px; color: #4A4A4A !important; -webkit-text-fill-color: #4A4A4A !important; }
        .stamp-en { font-family: 'Yozai', cursive; display: flex; justify-content: space-between; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-top: 0.3rem; opacity: 0.8; letter-spacing: 1px; color: #4A4A4A !important; -webkit-text-fill-color: #4A4A4A !important; }

        .export-btn {
            margin-top: 2rem;
            padding: 0.8rem 2rem;
            background-color: var(--primary-color);
            color: #fff !important;
            -webkit-text-fill-color: #fff !important;
            border: none;
            border-radius: 9999px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.2s;
            width: 80%;
            max-width: 360px;
        }
        .export-btn:hover { background-color: #1a252f; }

        .random-btn {
            background-color: var(--dot-bg);
            color: #fff !important;
            -webkit-text-fill-color: #fff !important;
            border: none;
            border-radius: 9999px;
            padding: 0.2rem 0.6rem;
            font-size: 0.8rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .random-btn:hover { opacity: 0.8; }

        @media (max-width: 900px) {
            .container { flex-direction: column; }
            body { padding: 1rem; }
        }

        /* 遮罩层与预览弹窗样式 */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
            animation: fadeIn 0.2s ease-out;
        }

        .modal-tip {
            color: #b2bec3 !important;
            -webkit-text-fill-color: #b2bec3 !important;
            font-size: 0.75rem;
            font-weight: 400;
            margin-top: 0.8rem;
            letter-spacing: 0.5px;
            text-align: center;
            opacity: 0.8;
        }

        .result-image {
            max-width: 100%;
            max-height: 65vh;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            object-fit: contain;
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .download-modal-btn, .close-modal-btn {
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 9999px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
            font-family: inherit;
        }

        .download-modal-btn {
            background-color: var(--primary-color) !important;
            color: #ffffff !important;
            -webkit-text-fill-color: #ffffff !important;
            border: 1px solid rgba(255,255,255,0.2) !important;
        }

        .download-modal-btn:hover {
            background-color: #1a252f !important;
        }

        .close-modal-btn {
            background-color: #ffffff !important;
            color: var(--primary-color) !important;
            -webkit-text-fill-color: var(--primary-color) !important;
            border: none !important;
        }

        .close-modal-btn:hover {
            background-color: #f5f6fa !important;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="form-section">
        <h2 style="margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center;">输入宠物资料<span style="font-size: 0.85rem; color: #7f8c8d; font-weight: normal; font-family: system-ui, -apple-system, sans-serif;">v1.2.0</span></h2>
        <div class="form-group">
            <label>上传照片</label>
            <input type="file" id="inputPhoto" accept="image/png, image/jpeg, image/webp">
        </div>
        <div class="form-group">
            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 0.5rem;">
                <label style="margin-bottom: 0;">名字</label>
                <button id="btnRandomName" type="button" class="random-btn">🎲 随机生成</button>
            </div>
            <input type="text" id="inputName" value="输入名字">
        </div>
        <div class="form-group">
            <label>品种和性格</label>
            <input type="text" id="inputBreed" value="中华田园犬，亲人">
        </div>
        <div class="form-group">
            <label>性别</label>
            <select id="inputGender">
                <option value="弟弟">弟弟</option>
                <option value="妹妹">妹妹</option>
            </select>
        </div>
        <div class="form-group">
            <label>年龄</label>
            <input type="text" id="inputAge" value="3个月">
        </div>
        <div class="form-group">
            <label>体重</label>
            <input type="text" id="inputWeight" value="3kg">
        </div>
        <div class="form-group">
            <label>疫苗情况</label>
            <select id="inputVaccine">
                <option value="已疫苗">已疫苗</option>
                <option value="未疫苗">未疫苗</option>
            </select>
        </div>
        <div class="form-group">
            <label>绝育情况</label>
            <select id="inputSpay">
                <option value="已绝育">已绝育</option>
                <option value="未绝育">未绝育</option>
            </select>
        </div>
        <div class="form-group">
            <label>Ta的故事</label>
            <textarea id="inputStory" placeholder="从小就在流浪狗基地生活的毛孩子，性格很亲人，每次去都没能把她接出来，这次终于能有机会给她一个不一样的狗生！">从小就在流浪狗基地生活的毛孩子，性格很亲人，每次去都没能把她接出来，这次终于能有机会给她一个不一样的狗生！</textarea>
        </div>
        <div class="form-group" style="margin-bottom: 2.5rem;">
            <label>上传二维码</label>
            <input type="file" id="inputQRCode" accept="image/png, image/jpeg, image/webp">
        </div>
    </div>

    <div class="preview-section" id="previewSection">
        
        <!-- 缩放控制面板 -->
        <div class="zoom-control-panel" id="zoomControlGroup" style="display: none;">
            <label>照片缩放:</label>
            <input type="range" id="zoomSlider" min="1" max="3" step="0.01" value="1">
        </div>

        <div class="poster-wrapper" id="posterWrapper">
            <div class="poster" id="posterElement">
                <div class="poster-image-container" id="photoContainer">
                    
                    <!-- 核心修复层：将照片隔离，切断底部溢出隐患 -->
                    <div class="photo-crop-layer">
                        <img id="renderPhoto" class="main-photo" draggable="false" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" alt="Pet Photo">
                    </div>
                    
                    <div class="gradient-mask"></div>
                    
                    <div class="wave-overlay">
                        <!-- Solid Wave Fill (Back Layer) -->
                        <svg class="wave-back-svg" width="200%" height="100%" viewBox="0 0 1000 320" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
                            <path id="waveBackPath" fill="" fill-opacity="1" d="M 0 150 C 100 66, 150 276, 250 150 C 350 24, 400 234, 500 150 C 600 66, 650 276, 750 150 C 850 24, 900 234, 1000 150 L 1000 320 L 0 320 Z"></path>
                        </svg>
                        <!-- Solid Wave Fill (Front Layer) -->
                        <svg class="wave-main-svg" width="200%" height="100%" viewBox="0 0 1000 320" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
                            <path id="wavePath" fill="" fill-opacity="1" d="M 0 150 C 100 66, 150 276, 250 150 C 350 24, 400 234, 500 150 C 600 66, 650 276, 750 150 C 850 24, 900 234, 1000 150 L 1000 320 L 0 320 Z"></path>
                        </svg>

<script>
    let posterViewScale = 1;
    function resizePoster() {
        const wrap = document.getElementById('previewSection');
        const posterWrap = document.getElementById('posterWrapper');
        const scale = Math.min(1, wrap.clientWidth / 482); 
        posterViewScale = scale;
        posterWrap.style.transform = `scale(${scale})`;
        posterWrap.style.height = `${600 * scale}px`; 
        const exportBtn = document.querySelector('.export-btn');
        if (exportBtn) {
            exportBtn.style.maxWidth = `${360 * scale}px`;
        }
    }
    window.addEventListener('resize', resizePoster);
    resizePoster(); 

    const bindings = [
        { input: 'inputName', render: 'renderName' },
        { input: 'inputGender', render: 'renderGender' },
        { input: 'inputBreed', render: 'renderBreed' },
        { input: 'inputAge', render: 'renderAge' },
        { input: 'inputWeight', render: 'renderWeight' },
        { input: 'inputVaccine', render: 'renderVaccine' },
        { input: 'inputSpay', render: 'renderSpay' },
        { input: 'inputStory', render: 'renderStory' }
    ];

    // 动态生成 1x1 纯色 PNG 以绕过暗黑模式反转，且不污染画布
    function createSolidPNG(color) {
        const canvas = document.createElement('canvas');
        canvas.width = 1;
        canvas.height = 1;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = color;
        ctx.fillRect(0, 0, 1, 1);
        return canvas.toDataURL('image/png');
    }

    // 动态生成 6x6 圆点 PNG 以绕过反转，且不污染画布
    function createDotPNG(color) {
        const canvas = document.createElement('canvas');
        canvas.width = 6;
        canvas.height = 6;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(3, 3, 3, 0, Math.PI * 2);
        ctx.fill();
        return canvas.toDataURL('image/png');
    }

    const updateTheme = () => {
        const gender = document.getElementById('inputGender').value;
        const posterNode = document.getElementById('posterElement');
        const themeColors = {
            '弟弟': { bg: '#D3DCE0', dot: '#6B8798', backWave: '#F2E6E6', qr: '#142433' },
            '妹妹': { bg: '#F2E6E6', dot: '#C08D8D', backWave: '#D3DCE0', qr: '#331B1B' },
            '未知': { bg: '#E0E5E8', dot: '#747D82', backWave: '#C8D0D4', qr: '#24282B' } 
        };
        const target = themeColors[gender] || themeColors['未知'];
        
        // 动态修改波浪 SVG 的填充色与背后层颜色
        const wavePath = document.getElementById('wavePath');
        if (wavePath) {
            wavePath.setAttribute('fill', target.bg);
        }
        const waveBackPath = document.getElementById('waveBackPath');
        if (waveBackPath) {
            waveBackPath.setAttribute('fill', target.backWave);
        }

        // 动态生成纯色 PNG 作为背景，彻底绕过浏览器的背景颜色强制反转
        const bgBase64 = `url(${createSolidPNG(target.bg)})`;
        posterNode.style.backgroundImage = bgBase64;
        document.querySelector('.poster-info-container').style.backgroundImage = bgBase64;
        // Also apply to image container to eliminate the subpixel seam line
        document.querySelector('.poster-image-container').style.backgroundImage = bgBase64;

        // 动态生成属性圆点 PNG 绕过反转
        const dotBase64 = `url(${createDotPNG(target.dot)})`;
        document.querySelectorAll('.dot').forEach(el => {
            el.style.backgroundImage = dotBase64;
        });

        // 同步更新二维码颜色为当前主题颜色
        applyQRCodeTheme();
    };

    // 裁剪自定义二维码的白边
    function cropWhiteBorders(img) {
        const tempCanvas = document.createElement('canvas');
        const tempCtx = tempCanvas.getContext('2d');
        tempCanvas.width = img.width;
        tempCanvas.height = img.height;
        tempCtx.drawImage(img, 0, 0);

        const imageData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
        const data = imageData.data;
        const width = tempCanvas.width;
        const height = tempCanvas.height;

        let minX = width;
        let maxX = 0;
        let minY = height;
        let maxY = 0;

        for (let y = 0; y < height; y++) {
            for (let x = 0; x < width; x++) {
                const index = (y * width + x) * 4;
                const r = data[index];
                const g = data[index + 1];
                const b = data[index + 2];
                const a = data[index + 3];

                if (a > 50) {
                    const brightness = (r + g + b) / 3;
                    if (brightness < 235) { // non-white pixel
                        if (x < minX) minX = x;
                        if (x > maxX) maxX = x;
                        if (y < minY) minY = y;
                        if (y > maxY) maxY = y;
                    }
                }
            }
        }

        if (maxX < minX || maxY < minY) {
            return img; // Return original if no content
        }

        const cropWidth = maxX - minX;
        const cropHeight = maxY - minY;
        const padding = Math.max(8, Math.round(Math.min(cropWidth, cropHeight) * 0.03));
        
        const targetMinX = Math.max(0, minX - padding);
        const targetMinY = Math.max(0, minY - padding);
        const targetMaxX = Math.min(width, maxX + padding);
        const targetMaxY = Math.min(height, maxY + padding);
        const finalWidth = targetMaxX - targetMinX;
        const finalHeight = targetMaxY - targetMinY;

        const cropCanvas = document.createElement('canvas');
        cropCanvas.width = finalWidth;
        cropCanvas.height = finalHeight;
        const cropCtx = cropCanvas.getContext('2d');
        cropCtx.drawImage(
            img,
            targetMinX, targetMinY, finalWidth, finalHeight,
            0, 0, finalWidth, finalHeight
        );

        return cropCanvas; // Canvas is compatible with drawImage
    }

    // 全局保存原始二维码图像，以便在切换性别主题时重新计算颜色
    let originalQRCodeImg = null;
    const initQrImg = new Image();
    initQrImg.onload = () => {
        originalQRCodeImg = cropWhiteBorders(initQrImg);
        applyQRCodeTheme();
    };
    initQrImg.src = document.getElementById('posterQrCode').src;

    function applyQRCodeTheme() {
        if (!originalQRCodeImg) return;
        const gender = document.getElementById('inputGender').value;
        const themeColors = {
            '弟弟': { bg: '#D3DCE0', dot: '#6B8798', qr: '#142433' },
            '妹妹': { bg: '#F2E6E6', dot: '#C08D8D', qr: '#331B1B' },
            '未知': { bg: '#E0E5E8', dot: '#747D82', qr: '#24282B' } 
        };
        const targetColorHex = (themeColors[gender] || themeColors['未知']).qr;

        // 解析目标颜色的 RGB 值
        const rTarget = parseInt(targetColorHex.slice(1, 3), 16);
        const gTarget = parseInt(targetColorHex.slice(3, 5), 16);
        const bTarget = parseInt(targetColorHex.slice(5, 7), 16);

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = originalQRCodeImg.width;
        canvas.height = originalQRCodeImg.height;
        ctx.drawImage(originalQRCodeImg, 0, 0);

        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        
        // 遍历每一个像素 (R, G, B, A)
        for (let i = 0; i < data.length; i += 4) {
            const r = data[i];
            const g = data[i + 1];
            const b = data[i + 2];
            const a = data[i + 3];
            
            if (a === 0) continue;

            // 计算像素亮度
            const brightness = (r + g + b) / 3;
            if (brightness > 180) {
                // 发现白色/高亮像素 -> 透明度设为 0，透出海报底色
                data[i + 3] = 0;
            } else {
                // 发现黑色/暗色像素 -> 强制替换为当前主题色
                data[i] = rTarget;
                data[i + 1] = gTarget;
                data[i + 2] = bTarget;
            }
        }
        ctx.putImageData(imageData, 0, 0);
        document.getElementById('posterQrCode').src = canvas.toDataURL('image/png');
    }

    bindings.forEach(binding => {
        const inputEl = document.getElementById(binding.input);
        const renderEl = document.getElementById(binding.render);
        inputEl.addEventListener('input', () => renderEl.textContent = inputEl.value);
        inputEl.addEventListener('change', () => {
            renderEl.textContent = inputEl.value;
            if (binding.input === 'inputGender') updateTheme();
        });
    });
    updateTheme();

    const renderPhoto = document.getElementById('renderPhoto');
    const zoomSlider = document.getElementById('zoomSlider');
    const zoomControlGroup = document.getElementById('zoomControlGroup');
    
    let imgNativeWidth = 450, imgNativeHeight = 415; 
    let currentScale = 1, minScale = 1;
    let offsetX = 0, offsetY = 0; 
    const containerW = 450, containerH = 415;

    function applyImageTransform() {
        if (!imgNativeWidth) return;
        const renderW = imgNativeWidth * currentScale;
        const renderH = imgNativeHeight * currentScale;

        const maxX = Math.max(0, (renderW - containerW) / 2);
        const maxY = Math.max(0, (renderH - containerH) / 2);

        offsetX = Math.max(-maxX, Math.min(maxX, offsetX));
        offsetY = Math.max(-maxY, Math.min(maxY, offsetY));

        const left = (containerW - renderW) / 2 + offsetX;
        const top = (containerH - renderH) / 2 + offsetY;

        renderPhoto.style.width = (renderW + 4) + 'px';
        renderPhoto.style.height = (renderH + 4) + 'px';
        renderPhoto.style.left = (left - 2) + 'px';
        renderPhoto.style.top = (top - 2) + 'px';
        
        zoomSlider.value = currentScale;
    }

    document.getElementById('inputPhoto').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    imgNativeWidth = img.width;
                    imgNativeHeight = img.height;
                    
                    minScale = Math.max(containerW / imgNativeWidth, containerH / imgNativeHeight);
                    currentScale = minScale; 
                    offsetX = 0; offsetY = 0; 
                    
                    zoomSlider.min = minScale;
                    zoomSlider.max = minScale * 3; 
                    zoomSlider.step = (minScale * 3 - minScale) / 100;
                    zoomControlGroup.style.display = 'flex'; 

                    renderPhoto.src = event.target.result;
                    applyImageTransform();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }
    });

    document.getElementById('inputQRCode').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    // 更新全局原始二维码，并触发重绘
                    originalQRCodeImg = cropWhiteBorders(img);
                    applyQRCodeTheme();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }
    });

    zoomSlider.addEventListener('input', (e) => {
        currentScale = parseFloat(e.target.value);
        applyImageTransform();
    });

    renderPhoto.addEventListener('wheel', (e) => {
        e.preventDefault();
        const zoomStep = minScale * 0.1;
        if (e.deltaY < 0) {
            currentScale = Math.min(zoomSlider.max, currentScale + zoomStep);
        } else {
            currentScale = Math.max(minScale, currentScale - zoomStep);
        }
        applyImageTransform();
    });

    let isDragging = false;
    let startX, startY, initialOffsetX, initialOffsetY;

    const startDrag = (e) => {
        isDragging = true;
        renderPhoto.style.cursor = 'grabbing';
        
        if (e.type.includes('mouse')) {
            e.preventDefault();
        }
        
        startX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
        startY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
        initialOffsetX = offsetX;
        initialOffsetY = offsetY;
    };

    const onDrag = (e) => {
        if (!isDragging) return;
        e.preventDefault(); 
        const currentX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
        const currentY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
        
        const deltaX = (currentX - startX) / posterViewScale;
        const deltaY = (currentY - startY) / posterViewScale;
        
        offsetX = initialOffsetX + deltaX;
        offsetY = initialOffsetY + deltaY;
        
        applyImageTransform(); 
    };

    const endDrag = () => {
        isDragging = false;
        renderPhoto.style.cursor = 'grab';
    };

    renderPhoto.addEventListener('mousedown', startDrag);
    renderPhoto.addEventListener('touchstart', startDrag, { passive: false });
    window.addEventListener('mousemove', onDrag, { passive: false });
    window.addEventListener('touchmove', onDrag, { passive: false });
    window.addEventListener('mouseup', endDrag);
    window.addEventListener('touchend', endDrag);

    const singleChars = ["糯", "甜", "酥", "软", "脆", "蜜", "奶", "糖", "冰", "焦", "香", "豆", "麦", "果", "米"];
    const doubleChars = ["麻薯", "汤圆", "布丁", "蛋挞", "饼干", "馒头", "芝麻", "奶酪", "泡芙", "锅贴", "吐司", "薯条", "饭团", "蛋卷", "烧麦"];

    function generateRandomName() {
        const singleIndex = Math.floor(Math.random() * singleChars.length);
        const doubleIndex = Math.floor(Math.random() * doubleChars.length);
        const nameInput = document.getElementById('inputName');
        nameInput.value = singleChars[singleIndex] + doubleChars[doubleIndex];
        nameInput.dispatchEvent(new Event('input'));
    }
    document.getElementById('btnRandomName').addEventListener('click', generateRandomName);
    generateRandomName(); 

    async function exportPoster() {
        const posterWrap = document.getElementById('posterWrapper');
        const posterNode = document.getElementById('posterElement');
        
        const originalTransform = posterWrap.style.transform;
        const originalTransition = posterWrap.style.transition;
        posterWrap.style.transition = 'none'; 
        posterWrap.style.transform = 'none'; 
        
        const exportBtn = document.querySelector('.export-btn');
        const originalBtnText = exportBtn.textContent;
        exportBtn.textContent = '生成中...';
        exportBtn.disabled = true;

        const exportTip = document.getElementById('exportTip');
        if (exportTip) {
            exportTip.style.display = 'block';
        }

        const waveOverlay = document.querySelector('.wave-overlay');
        const waveMain = document.querySelector('.wave-main-svg');
        const waveBack = document.querySelector('.wave-back-svg');
        const logo = document.querySelector('#posterLogo');
        
        // --- Bulletproof strategy: convert SVG waves and watermark to static PNG <img> tags ---
        // html2canvas has persistent bugs with SVG + CSS animations/positioning/useCORS.
        // By converting them to static PNG data-URLs at runtime, we bypass all SVG bugs.
        
        const overlayRect = waveOverlay.getBoundingClientRect();
        
        function imgSvgToPng(imgEl) {
            return new Promise((resolve) => {
                const rect = imgEl.getBoundingClientRect();
                const widthPx = rect.width;
                const heightPx = rect.height;
                
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.src = imgEl.src;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = widthPx * 2;
                    canvas.height = heightPx * 2;
                    const ctx = canvas.getContext('2d');
                    ctx.scale(2, 2);
                    ctx.drawImage(img, 0, 0, widthPx, heightPx);
                    resolve(canvas.toDataURL('image/png'));
                };
                img.onerror = () => {
                    resolve(null);
                };
            });
        }

        async function svgToStaticImg(svgEl) {
            const rect = svgEl.getBoundingClientRect();
            const leftPx = rect.left - overlayRect.left;
            const topPx = rect.top - overlayRect.top;
            const widthPx = rect.width;
            const heightPx = rect.height;
            
            const clone = svgEl.cloneNode(true);
            clone.removeAttribute('class');
            clone.removeAttribute('style');
            clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
            clone.setAttribute('width', String(widthPx));
            clone.setAttribute('height', String(heightPx));
            
            const serializer = new XMLSerializer();
            const svgString = serializer.serializeToString(clone);
            const dataUrl = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgString)));
            
            const pngUrl = await new Promise((resolve) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.src = dataUrl;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = widthPx * 2;
                    canvas.height = heightPx * 2;
                    const ctx = canvas.getContext('2d');
                    ctx.scale(2, 2);
                    ctx.drawImage(img, 0, 0, widthPx, heightPx);
                    resolve(canvas.toDataURL('image/png'));
                };
                img.onerror = () => {
                    resolve(null);
                };
            });
            
            const img = document.createElement('img');
            img.src = pngUrl || dataUrl;
            img.style.cssText = 'position:absolute;' +
                'left:' + leftPx + 'px;' +
                'top:' + topPx + 'px;' +
                'width:' + widthPx + 'px;' +
                'height:' + heightPx + 'px;';
            return img;
        }
        
        // Capture current wave positions as static images BEFORE stopping animations
        const backImg = await svgToStaticImg(waveBack);
        backImg.style.zIndex = '1';
        const mainImg = await svgToStaticImg(waveMain);
        mainImg.style.zIndex = '2';
        
        // Save original wave overlay HTML (includes current fill attributes)
        const originalWaveHTML = waveOverlay.innerHTML;
        
        // Replace animated SVGs with static images
        waveOverlay.innerHTML = '';
        waveOverlay.appendChild(backImg);
        waveOverlay.appendChild(mainImg);
        
        // Freeze logo animation
        if (logo) {
            logo.style.animation = 'none';
            logo.style.transform = 'none';
        }

        // Convert paw SVG watermark to PNG in-place
        const pawImgEl = document.getElementById('posterPaw');
        let originalPawSrc = '';
        if (pawImgEl) {
            originalPawSrc = pawImgEl.src;
            const pngUrl = await imgSvgToPng(pawImgEl);
            if (pngUrl) {
                pawImgEl.src = pngUrl;
            }
        }

        await new Promise(resolve => setTimeout(resolve, 100)); 

        try {
            await document.fonts.ready;
            const canvas = await html2canvas(posterNode, { 
                scale: 3,
                useCORS: true,
                width: 450,
                height: 600
            });
            
            posterWrap.style.transform = originalTransform; 
            
            // 将生成的 base64 赋值给弹窗图片
            const resultImg = document.getElementById('resultImage');
            resultImg.src = canvas.toDataURL("image/jpeg", 0.9);
            
            // 显示遮罩弹窗
            document.getElementById('resultModal').style.display = 'flex';
        } catch (error) {
            console.error("生成海报失败:", error);
            alert("海报生成失败，请稍后重试。");
        } finally {
            // Restore original animated SVG waves
            waveOverlay.innerHTML = originalWaveHTML;
            if (logo) { logo.style.animation = ''; logo.style.transform = ''; }
            
            // Restore original paw SVG src
            if (pawImgEl && originalPawSrc) {
                pawImgEl.src = originalPawSrc;
            }
            
            posterWrap.style.transform = originalTransform;
            // Force reflow to prevent animation jumping
            void posterWrap.offsetWidth;
            posterWrap.style.transition = originalTransition;
            exportBtn.textContent = originalBtnText;
            exportBtn.disabled = false;
        }
    }


    function closeModal() {
        document.getElementById('resultModal').style.display = 'none';
        document.getElementById('resultImage').src = '';
    }

    function downloadPoster() {
        const resultImg = document.getElementById('resultImage');
        if (!resultImg.src) return;
        const link = document.createElement('a');
        const petName = document.getElementById('inputName').value || '宠物';
        link.download = `领养海报_${petName}.jpg`;
        link.href = resultImg.src;
        link.click();
    }
</script>
